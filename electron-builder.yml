appId: com.claude-corroboree.app
productName: Claude Corroboree
icon: assets/icon-256.png
directories:
  output: release
  buildResources: build
files:
  - "**/*"
  - "!docs/**"
  - "!scripts/**"
  - "!release/**"
extraResources:
  - from: dist/mcp-server.js
    to: mcp-server.js
  - from: scripts/
    to: scripts/
  - from: assets/
    to: assets/
publish:
  provider: github
  owner: tumourlove
  repo: claude-corroboree
win:
  target: [nsis, portable]
  icon: assets/icon.ico
  signAndEditExecutable: false
nsis:
  artifactName: "Claude-Corroboree-Setup-${version}.${ext}"
  oneClick: false
  perMachine: false
  allowElevation: false
  runAfterFinish: true
